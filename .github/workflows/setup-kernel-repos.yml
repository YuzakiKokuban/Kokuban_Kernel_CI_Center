name: Setup Kernel Repos
on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit Message'
        required: true
        default: '[skip ci] ci: Sync central CI files'
      readme_language:
        description: 'README Language'
        required: true
        type: choice
        options:
          - both
          - zh-CN
          - en-US
        default: 'both'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download CI Core
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download ci-core-latest -p "kokuban_ci_core" --clobber
          chmod +x kokuban_ci_core
          
      - name: Initialize Repositories
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.PUSH_SERVER_WEBHOOK_SECRET }}
        run: |
          ./kokuban_ci_core setup \
            --token "${{ secrets.GH_TOKEN }}" \
            --commit-message "${{ inputs.commit_message }}" \
            --readme-language "${{ inputs.readme_language }}"

      - name: Delete Legacy KSU Branches
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          jq -r 'to_entries[] | select(.key | startswith("_") | not) | .value.repo' configs/projects.json | while read -r repo; do
            for legacy_branch in ksu mksu; do
              echo "Deleting ${legacy_branch} from ${repo} if it exists..."
              gh api \
                --method DELETE \
                "repos/${repo}/git/refs/heads/${legacy_branch}" \
                --silent \
                || true
            done
          done

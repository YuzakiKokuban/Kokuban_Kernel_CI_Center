name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Select Project'
        required: true
        type: choice
        options:
          - z5_sm8550
          - s25_sm8750
          - s23_sm8550
          - s24_sm8650
          - tabs10_mt6989
          - z6_sm8650
          - mi17_sm8850
      branch:
        description: 'Git Branch/Tag'
        required: true
        default: 'main'
      ksu_variant:
        description: 'KSU Variant Override'
        type: choice
        options:
          - default
          - resukisu
          - mksu
          - ksu
          - lkm
        default: 'default'
      do_release:
        description: 'Create Release'
        type: boolean
        default: true
      custom_localversion:
        description: 'Custom Localversion Override'
        type: string
        required: false
        default: ''
      custom_build_time:
        description: 'Custom Build Time Override'
        type: string
        required: false
        default: ''
  repository_dispatch:
    types: [build-kernel]
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      branch:
        required: true
        type: string
      ksu_variant:
        type: string
        default: 'default'
      do_release:
        type: boolean
        default: true
      custom_localversion:
        type: string
        default: ''
      custom_build_time:
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Normalize Inputs
        id: inputs
        run: |
          PROJECT=""
          BRANCH=""
          VARIANT="default"
          RELEASE="true"
          CUSTOM_LOCALVERSION=""
          CUSTOM_BUILD_TIME=""

          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            PROJECT="${{ github.event.client_payload.project }}"
            BRANCH="${{ github.event.client_payload.branch }}"
          elif [ "${{ github.event_name }}" == "workflow_call" ]; then
            PROJECT="${{ inputs.project }}"
            BRANCH="${{ inputs.branch }}"
            VARIANT="${{ inputs.ksu_variant }}"
            RELEASE="${{ inputs.do_release }}"
            CUSTOM_LOCALVERSION="${{ inputs.custom_localversion }}"
            CUSTOM_BUILD_TIME="${{ inputs.custom_build_time }}"
          else
            PROJECT="${{ inputs.project }}"
            BRANCH="${{ inputs.branch }}"
            VARIANT="${{ inputs.ksu_variant }}"
            RELEASE="${{ inputs.do_release }}"
            CUSTOM_LOCALVERSION="${{ inputs.custom_localversion }}"
            CUSTOM_BUILD_TIME="${{ inputs.custom_build_time }}"
          fi

          echo "PROJECT=${PROJECT}" >> $GITHUB_ENV
          echo "BRANCH_TARGET=${BRANCH}" >> $GITHUB_ENV
          echo "VARIANT_INPUT=${VARIANT}" >> $GITHUB_ENV
          echo "DO_RELEASE=${RELEASE}" >> $GITHUB_ENV
          echo "CUSTOM_LOCALVERSION=${CUSTOM_LOCALVERSION}" >> $GITHUB_ENV
          echo "CUSTOM_BUILD_TIME=${CUSTOM_BUILD_TIME}" >> $GITHUB_ENV

      - name: Download CI Core
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download ci-core-latest -p "kokuban_ci_core"
          chmod +x kokuban_ci_core

      - name: Parse Configuration
        run: ./kokuban_ci_core parse --project ${{ env.PROJECT }}

      - name: Determine Variant
        run: |
          if [ "${{ env.VARIANT_INPUT }}" == "default" ] || [ -z "${{ env.VARIANT_INPUT }}" ]; then
            echo "VARIANT=${{ env.BRANCH_TARGET }}" >> $GITHUB_ENV
          else
            echo "VARIANT=${{ env.VARIANT_INPUT }}" >> $GITHUB_ENV
          fi

      - name: Cache Toolchain
        uses: actions/cache@v4
        with:
          path: |
            prebuilts
            kernel_platform/prebuilts
            bin
            build-tools
            bindgen-cli-x86_64-unknown-linux-gnu
          key: ${{ runner.os }}-toolchain-${{ env.PROJECT }}

      - name: Checkout Kernel Source
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PROJECT_REPO }}
          ref: ${{ env.BRANCH_TARGET }}
          path: kernel_source
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: ${{ env.PROJECT }}-${{ env.VARIANT }}-${{ env.BRANCH_TARGET }}
          max-size: 5G

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses5-dev bc bison flex libssl-dev p7zip-full lz4 cpio curl libelf-dev dwarves jq lld pahole libdw-dev ccache
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build and Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ARGS=(--project ${{ env.PROJECT }} --branch ${{ env.VARIANT }} --do-release ${{ env.DO_RELEASE }})
          if [ -n "${{ env.CUSTOM_LOCALVERSION }}" ]; then
            ARGS+=("--custom-localversion=${{ env.CUSTOM_LOCALVERSION }}")
          fi
          if [ -n "${{ env.CUSTOM_BUILD_TIME }}" ]; then
            ARGS+=("--custom-build-time=${{ env.CUSTOM_BUILD_TIME }}")
          fi
          ./kokuban_ci_core build "${ARGS[@]}"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ env.PROJECT }}-kernel-${{ github.run_id }}
          path: "*.zip"
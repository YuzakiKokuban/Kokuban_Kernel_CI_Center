name: Release All Branches
on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Select Project'
        required: true
        type: choice
        options: [z5_sm8550, s25_sm8750, s23_sm8550, tabs9_sm8550, s24_sm8650, tabs10_mt6989, z6_sm8650, mi17_sm8850]

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Download CI Core
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download ci-core-latest -p "kokuban_ci_core" --clobber
          chmod +x kokuban_ci_core

      - name: Generate Matrix
        id: set-matrix
        run: ./kokuban_ci_core matrix --project ${{ inputs.project }}

  build:
    needs: matrix
    strategy:
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/build_kernel.yml
    with:
      project: ${{ inputs.project }}
      branch: ${{ matrix.branch }}
      ksu_variant: ${{ matrix.ksu_variant }}
      do_release: true
      apply_susfs: true
      apply_bbg: true
      apply_rekernel: true
      apply_zram: true
    secrets: inherit
